<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <form action="#" class="form-calc">
        <div class="form-input">
            <div class="input1">
                <div class="input-icon">
                    <img src="./pictures/icon-input.png" alt="Иконка ввода информации">
                </div>
                <input class="form-input_style" type="number" name="number1" id="number1" placeholder="Введите первое число" required >
            </div>
            <div class="input2">
                <div class="input-icon">
                    <img src="./pictures/icon-input.png" alt="Иконка ввода информации">
                </div>
                <input class="form-input_style" type="number" name="number2" id="number2" placeholder="Введите второе число" required>
            </div>
        </div>
        <div class="button">
            <button type="button" class="button1 button_style" onclick="clickInputOne()">+</button>
            <button type="button" class="button2 button_style" onclick="clickInputTwo()">/</button>
            <button type="button" class="button3 button_style" onclick="clickInputThree()">-</button>
            <button type="button" class="button4 button_style" onclick="clickInputFour()">x</button>
        </div>
        <div>
            <output name="result" for="number1 number2" class="output-result"></output>
        </div>
    </form>
    <script src="./app.js"></script>
</body>
</html>
